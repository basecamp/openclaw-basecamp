version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/Chicago
    open-pull-requests-limit: 10
    groups:
      npm-minor-patch:
        update-types: [minor, patch]
    commit-message:
      prefix: "deps(npm)"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/Chicago
    open-pull-requests-limit: 10
    groups:
      github-actions:
        patterns: ["*"]
    commit-message:
      prefix: "deps(actions)"

version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/Chicago
    open-pull-requests-limit: 10
    groups:
      npm-minor-patch:
        update-types: [minor, patch]
    commit-message:
      prefix: "deps(npm)"
    cooldown:
      semver-major-days: 7
      semver-minor-days: 3
      semver-patch-days: 2
      default-days: 7

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/Chicago
    open-pull-requests-limit: 10
    groups:
      github-actions:
        patterns: ["*"]
    commit-message:
      prefix: "deps(actions)"
    cooldown:
      default-days: 7

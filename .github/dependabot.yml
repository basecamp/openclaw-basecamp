version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      timezone: America/Chicago
    groups:
      npm-minor-patch:
        update-types: [minor, patch]
    commit-message:
      prefix: "deps(npm):"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      timezone: America/Chicago
    groups:
      actions:
        update-types: [minor, patch]
    commit-message:
      prefix: "deps(actions):"

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22.5
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22.5
          cache: npm
      - run: npm ci
      - run: npm run lint
      - name: Lint workflow files
        uses: docker://rhysd/actionlint@sha256:6f03470d0152251d7f07f7c4dc019dbe7024c72cd952f839544c7798843efa8f
        with:
          args: -color

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22.5
          cache: npm
      - run: npm ci
      - run: npx vitest run --coverage
      - name: Upload coverage
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        if: always()
        with:
          name: coverage
          path: coverage/

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22.5
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Verify build output
        run: |
          test -f dist/index.js || { echo "::error::dist/index.js not found"; exit 1; }
          test -f dist/index.d.ts || { echo "::error::dist/index.d.ts not found"; exit 1; }

      - name: Verify package artifact
        run: |
          PACKED=$(npm pack --dry-run --json 2>/dev/null)
          # Verify openclaw.extensions target is in the tarball
          EXT=$(node -p "require('./package.json').openclaw.extensions[0]")
          # Strip leading ./ for comparison against pack output paths
          EXT_PATH="${EXT#./}"
          if ! echo "$PACKED" | node -e "
            const files = JSON.parse(require('fs').readFileSync(0,'utf8'))[0].files.map(f => f.path);
            const target = '$EXT_PATH';
            if (!files.includes(target)) {
              console.error('::error::openclaw.extensions target \"' + target + '\" not found in packed artifact');
              console.error('Packed files:', files.join(', '));
              process.exit(1);
            }
            console.log('openclaw.extensions target \"' + target + '\" verified in packed artifact');
          "; then
            exit 1
          fi

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    continue-on-error: true
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4

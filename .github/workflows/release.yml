name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:  # Manual trigger is always dry-run

concurrency:
  group: release
  cancel-in-progress: false

permissions: {}

jobs:
  security:
    uses: ./.github/workflows/security.yml
    permissions:
      contents: read
      security-events: write

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0 # zizmor: ignore[cache-poisoning] -- workflow only triggers on tag push and workflow_dispatch; cache is keyed by lockfile hash and default branch
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build

  publish:
    name: Publish to npm
    needs: [security, test]
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Verify tag is on main
        if: github.event_name == 'push'
        run: |
          git fetch origin main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0 # zizmor: ignore[cache-poisoning] -- workflow only triggers on tag push and workflow_dispatch; cache is keyed by lockfile hash and default branch
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - run: npm ci

      - name: Extract version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION=$(node -p "require('./package.json').version")
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "Rehearsal for version: $VERSION"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
            PKG_VERSION=$(node -p "require('./package.json').version")
            if [ "$PKG_VERSION" != "$VERSION" ]; then
              echo "::error::Package version ($PKG_VERSION) does not match tag version ($VERSION)"
              exit 1
            fi
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "Releasing version: $VERSION"
          fi

      - name: Determine npm tag
        id: npm-tag
        run: |
          VERSION="${STEPS_VERSION_OUTPUTS_VERSION}"
          if [[ "$VERSION" == *-* ]]; then
            echo "tag=next" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi
        env:
          STEPS_VERSION_OUTPUTS_VERSION: ${{ steps.version.outputs.version }}

      - name: Check if already published
        id: check-published
        if: github.event_name == 'push'
        run: |
          VERSION="${STEPS_VERSION_OUTPUTS_VERSION}"
          if npm view "@37signals/openclaw-basecamp@${VERSION}" version 2>/dev/null; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Version ${VERSION} already published to npm"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          STEPS_VERSION_OUTPUTS_VERSION: ${{ steps.version.outputs.version }}

      - name: Build
        run: npm run build

      - name: Verify package artifact
        run: bash scripts/verify-pack.sh

      - name: Publish to npm
        if: steps.check-published.outputs.already_published != 'true'
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            npm publish --access public --tag "${STEPS_NPM_TAG_OUTPUTS_TAG}" --provenance
          else
            echo "::notice::Dry run mode - not actually publishing"
            npm publish --access public --tag "${STEPS_NPM_TAG_OUTPUTS_TAG}" --dry-run
          fi
        env:
          STEPS_NPM_TAG_OUTPUTS_TAG: ${{ steps.npm-tag.outputs.tag }}

      - name: Create GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1 # zizmor: ignore[superfluous-actions] -- action is more maintainable than inline gh release commands
        with:
          generate_release_notes: true
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}

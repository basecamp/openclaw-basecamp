name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  security:
    uses: ./.github/workflows/security.yml
    permissions:
      contents: read
      security-events: write

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - name: Verify build output
        run: |
          test -f dist/index.js || { echo "dist/index.js missing"; exit 1; }
          test -f dist/index.d.ts || { echo "dist/index.d.ts missing"; exit 1; }

  publish:
    needs: [security, test]
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org
      - name: Verify tag is on main
        run: |
          git fetch origin main --depth=1
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Check if version already published
        id: check
        run: |
          if npm view "@37signals/openclaw-basecamp@${{ steps.version.outputs.version }}" version 2>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - run: npm ci
      - run: npm run build
      - name: Publish to npm
        if: steps.check.outputs.exists == 'false'
        run: |
          TAG_FLAG=""
          if [[ "${{ steps.version.outputs.version }}" == *-* ]]; then
            TAG_FLAG="--tag next"
          fi
          npm publish --provenance $TAG_FLAG
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
